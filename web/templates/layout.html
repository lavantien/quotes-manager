{{define "page"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quotes</title>
<link rel="stylesheet" href="/static/app.css">
<script src="/static/htmx.min.js" defer></script>
<script src="/static/app.js" defer></script>
</head>
<body>
<main class="page">
  <header class="topbar">
    <h1 class="topbar__title">Quotes</h1>
    <div class="topbar__actions">
      <button type="button" class="btn" data-action="copy-all">Copy all</button>
      <button type="button" class="btn btn--primary" hx-get="/quotes/new" hx-target="#form-slot" hx-swap="innerHTML">+ New</button>
    </div>
  </header>
  <div id="form-slot" class="form-slot"></div>
  <div class="toolbar">
    <label class="select-all"><input type="checkbox" id="select-all"> select all</label>
    <button type="button" class="btn btn--danger" data-action="bulk-delete" disabled>Delete selected</button>
  </div>
  {{template "content" .}}
</main>
</body>
</html>
{{end}}
