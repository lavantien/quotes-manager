{{define "quote_block"}}
<article class="quote" id="quote-{{.Quote.ID}}" data-id="{{.Quote.ID}}">
  <div class="quote__check">
    <input type="checkbox" class="select" name="id" value="{{.Quote.ID}}" aria-label="Select quote">
  </div>
  <div class="quote__body">{{display .Quote .Terms}}</div>
  {{template "quote_chips" (chipsFor .Quote.ID .Cats)}}
  {{template "quote_collection_chips" (colChipsFor .Quote.ID .Cols)}}
  <div class="quote__actions">
    <button type="button" class="btn btn--sm" data-action="copy" data-id="{{.Quote.ID}}">Copy</button>
    <button type="button" class="btn btn--sm" hx-get="/quotes/{{.Quote.ID}}/edit" hx-target="#quote-{{.Quote.ID}}" hx-swap="outerHTML">Edit</button>
    <button type="button" class="btn btn--sm" hx-get="/quotes/{{.Quote.ID}}/categories/edit" hx-target="#chips-{{.Quote.ID}}" hx-swap="outerHTML" title="Edit categories">&#9998;</button>
    <button type="button" class="btn btn--sm btn--danger" hx-delete="/quotes/{{.Quote.ID}}" hx-target="#quote-{{.Quote.ID}}" hx-swap="delete" hx-confirm="Delete this quote?">Delete</button>
  </div>
</article>
{{end}}
