{{define "root_zone"}}
<section class="zone zone--root" id="root-zone" data-cat="{{.ActiveCatID}}">
  {{template "root_zone_body" .}}
</section>
{{end}}

{{define "root_zone_oob"}}
<section class="zone zone--root" id="root-zone" data-cat="{{.ActiveCatID}}" hx-swap-oob="outerHTML">
  {{template "root_zone_body" .}}
</section>
{{end}}

{{define "root_count"}}
<span id="root-count" class="zone__count" hx-swap-oob="outerHTML">{{.}} blocks</span>
{{end}}

{{define "root_zone_body"}}
<header class="zone__head">
  <span class="zone__title">{{.Root.Title}}</span>
  <span class="zone__count" id="root-count">{{.Root.Count}} blocks</span>
</header>
<div class="zone__toolbar">
  <label class="select-all"><input type="checkbox" id="select-all"> <span>all</span></label>
  <button type="button" class="btn btn--sm btn--primary" hx-get="/quotes/new" hx-target="#form-slot" hx-swap="innerHTML">+ New</button>
  <button type="button" class="btn btn--sm btn--danger" data-action="bulk-delete" disabled>Delete</button>
  <button type="button" class="btn btn--sm" data-action="copy-all" data-export="{{.Root.ExportURL}}">Copy all</button>
  <input type="search" class="zone__search rail__input" name="rq" placeholder="Search" value="{{.Root.Query}}" autocomplete="off"
         hx-get="/search/root" hx-trigger="input changed delay:200ms, search" hx-target="#quote-list" hx-swap="innerHTML" hx-include="this"
         hx-vals='{"cat": "{{.ActiveCatID}}"}'>
</div>
<div id="form-slot" class="form-slot"></div>
{{template "quote_list" .}}
{{end}}
